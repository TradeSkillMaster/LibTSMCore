name: Documentation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout LibTSMClass
        uses: actions/checkout@v4
        with:
          repository: TradeSkillMaster/LibTSMClass
          path: LibTSMClass/

      - name: Download wowlua-ls
        uses: robinraju/release-downloader@v1
        with:
          repository: 'TradeSkillMaster/wowlua-ls'
          latest: true
          fileName: 'wowlua_ls-x86_64-unknown-linux-gnu'
          out-file-path: './'

      - name: Install wowlua_ls
        run: |
          chmod +x wowlua_ls-x86_64-unknown-linux-gnu
          mv wowlua_ls-x86_64-unknown-linux-gnu wowlua_ls
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install npm dependencies
        run: npm install
        working-directory: Docs

      - name: Build docs
        run: npm run docs:build
        working-directory: Docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Docs/.vitepress/dist/
          force_orphan: true
